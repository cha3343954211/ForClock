<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <radialGradient id="fog" cx="50%" cy="60%" r="65%">
      <stop offset="0%" stop-color="#b0c8b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a2a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="60%" stop-color="#1f3320"/>
      <stop offset="100%" stop-color="#2a4530"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Distant mountains / hills -->
  <ellipse cx="960" cy="720" rx="900" ry="340" fill="#1a2e1a" filter="url(#blur)" opacity="0.9"/>
  <ellipse cx="400" cy="760" rx="500" ry="280" fill="#152815" filter="url(#blur)" opacity="0.8"/>
  <ellipse cx="1500" cy="750" rx="520" ry="260" fill="#152815" filter="url(#blur)" opacity="0.8"/>

  <!-- Mid trees (blurred) -->
  <g filter="url(#blur)" opacity="0.85">
    <rect x="100" y="500" width="30" height="300" fill="#0d1f0d"/>
    <ellipse cx="115" cy="480" rx="60" ry="90" fill="#142a14"/>
    <rect x="200" y="520" width="25" height="280" fill="#0d1f0d"/>
    <ellipse cx="212" cy="500" rx="50" ry="80" fill="#1a331a"/>
    <rect x="300" y="480" width="35" height="320" fill="#0a1a0a"/>
    <ellipse cx="317" cy="460" rx="70" ry="100" fill="#112211"/>
    <rect x="1600" y="490" width="30" height="310" fill="#0d1f0d"/>
    <ellipse cx="1615" cy="470" rx="65" ry="95" fill="#142a14"/>
    <rect x="1700" y="510" width="28" height="290" fill="#0a1a0a"/>
    <ellipse cx="1714" cy="490" rx="55" ry="85" fill="#1a331a"/>
    <rect x="1800" y="475" width="32" height="325" fill="#0d1f0d"/>
    <ellipse cx="1816" cy="455" rx="68" ry="98" fill="#112211"/>
    <rect x="700" y="520" width="22" height="260" fill="#0a1a0a"/>
    <ellipse cx="711" cy="502" rx="45" ry="72" fill="#132613"/>
    <rect x="1200" y="515" width="24" height="265" fill="#0a1a0a"/>
    <ellipse cx="1212" cy="496" rx="48" ry="75" fill="#142a14"/>
  </g>

  <!-- Foreground trees (sharp) -->
  <rect x="0"    y="600" width="50" height="480" fill="#060e06"/>
  <rect x="1870" y="610" width="50" height="480" fill="#060e06"/>
  <ellipse cx="25"   cy="560" rx="90"  ry="140" fill="#091509"/>
  <ellipse cx="1895" cy="570" rx="95"  ry="145" fill="#091509"/>

  <!-- Fog overlay -->
  <rect width="1920" height="1080" fill="url(#fog)"/>

  <!-- Bottom ground mist -->
  <ellipse cx="960" cy="1100" rx="1100" ry="200" fill="#8aad8a" opacity="0.12" filter="url(#blur)"/>
</svg>
