<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1A1A1A" />
    <meta name="description" content="For Clock - 极简禅意时钟屏保，融合 AI 感悟与手势交互" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="For Clock" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>For Clock Screensaver</title>

    <!-- 关键内联样式：立即上色，消除启动黑/白屏 -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #1A1A1A;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      /* 启动占位层 —— React 挂载后会被替换 */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A1A1A;
        z-index: 9999;
        transition: opacity 0.35s ease-out;
      }
      #boot-splash .dot {
        width: 10px;
        height: 10px;
        margin: 0 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      #boot-splash .dot:nth-child(2) { animation-delay: 0.15s; }
      #boot-splash .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes boot-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%           { transform: scale(1);   opacity: 1;   }
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 字体异步加载，不阻塞首屏 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Rajdhani:wght@600;700&family=Zen+Dots&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Rajdhani:wght@600;700&family=Zen+Dots&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
